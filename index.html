<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Todoroki Japanese Call</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(180deg,#1a0d13,#2a111d,#3d1527);
    height:100vh;
    overflow:hidden;
    color:white;
}

.backgroundGlow{
    position:absolute;
    width:600px;
    height:600px;
    background:#ff4f8b50;
    border-radius:50%;
    filter:blur(120px);
    top:-150px;
    left:-100px;
}

.container{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:2;
}

.callBox{
    width:90%;
    max-width:450px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:30px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 40px rgba(255,105,180,0.2);
}

.callText{
    margin-bottom:15px;
    opacity:0.7;
    font-size:14px;
}

.todoroki{
    width:100%;
    border-radius:20px;
    object-fit:cover;
    box-shadow:0 0 25px rgba(255,105,180,0.3);
}

.name{
    margin-top:15px;
    font-size:26px;
    font-weight:600;
}

.status{
    color:#8dffb3;
    font-size:14px;
    margin-top:5px;
}

.jp{
    margin-top:25px;
    font-size:22px;
    line-height:1.5;
}

.romaji{
    margin-top:10px;
    color:#ffc7d9;
    font-size:15px;
}

.pt{
    margin-top:15px;
    background:rgba(0,0,0,0.4);
    padding:15px;
    border-radius:15px;
    font-size:15px;
    line-height:1.5;
}

.controls{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    outline:none;
    cursor:pointer;
    border-radius:50%;
    width:70px;
    height:70px;
    font-size:26px;
    transition:0.3s;
}

.mic{
    background:#ff4f8b;
    color:white;
    box-shadow:0 0 20px #ff4f8b80;
}

.repeat{
    background:#ffffff15;
    color:white;
}

button:hover{
    transform:scale(1.08);
}

.footer{
    margin-top:20px;
    font-size:12px;
    opacity:0.5;
}

</style>
</head>

<body>

<div class="backgroundGlow"></div>

<div class="container">

<div class="callBox">

<div class="callText">
Ligação Privada • Japonês IA
</div>

<img class="todoroki" src="1000123409.jpg">

<div class="name">Shoto Todoroki</div>

<div class="status">● Online</div>

<div class="jp" id="jpText">
こんにちは。今日は日本語を練習しますか？
</div>

<div class="romaji" id="romajiText">
Konnichiwa. Kyou wa nihongo o renshuu shimasu ka?
</div>

<div class="pt" id="ptText">
Olá. Vamos praticar japonês hoje?
</div>

<div class="controls">

<button class="mic" onclick="startListening()">
🎤
</button>

<button class="repeat" onclick="speakJapanese()">
🔊
</button>

</div>

<div class="footer">
Todoroki AI • Japanese Immersion Prototype
</div>

</div>

</div>

<script>

const jpText = document.getElementById("jpText");
const ptText = document.getElementById("ptText");
const romajiText = document.getElementById("romajiText");

function speakJapanese(){

    const utterance = new SpeechSynthesisUtterance(
        jpText.innerText
    );

    utterance.lang = "ja-JP";
    utterance.rate = 0.9;

    speechSynthesis.speak(utterance);
}

function startListening(){

    const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

    const recognition = new SpeechRecognition();

    recognition.lang = "pt-BR";

    recognition.start();

    recognition.onresult = async function(event){

        const userSpeech =
        event.results[0][0].transcript;

        console.log(userSpeech);

        simulateAI(userSpeech);
    };
}

function simulateAI(message){

    if(message.includes("bom dia")){

        jpText.innerText =
        "おはようございます。";

        romajiText.innerText =
        "Ohayou gozaimasu.";

        ptText.innerText =
        "Bom dia.";

    }

    else if(message.includes("obrigado")){

        jpText.innerText =
        "ありがとうございます。";

        romajiText.innerText =
        "Arigatou gozaimasu.";

        ptText.innerText =
        "Muito obrigado.";

    }

    else{

        jpText.innerText =
        "大丈夫です。ゆっくり話してください。";

        romajiText.innerText =
        "Daijoubu desu. Yukkuri hanashite kudasai.";

        ptText.innerText =
        "Tudo bem. Fale devagar.";
    }

    speakJapanese();
}

window.onload = () => {
    setTimeout(() => {
        speakJapanese();
    },1000);
}

</script>

</body>
</html>
<img class="todoroki" src="1000123409.jpg">
